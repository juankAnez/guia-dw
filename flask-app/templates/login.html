<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acceso a la guía práctica para el parcial de Desarrollo Web y Bases de Datos II">
  <title>Guía Práctica - Acceso</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      background: linear-gradient(-45deg, #083344, #164e63, #083344, #042f2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #fff;
      font-family: 'Fira Sans', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
      .bg-orb { animation: none !important; }
      .login-card { animation: none !important; }
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .bg-orb-1 {
      width: 500px; height: 500px;
      background: #0891b2;
      top: -150px; left: -100px;
      animation: orbFloat 20s ease-in-out infinite;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: #22d3ee;
      bottom: -100px; right: -80px;
      animation: orbFloat 25s ease-in-out infinite reverse;
    }
    .bg-orb-3 {
      width: 300px; height: 300px;
      background: #22c55e;
      top: 50%; left: 50%;
      animation: orbFloat 18s ease-in-out infinite 5s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 2.5rem 2.5rem 2rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: cardIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .icon-wrap i {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.25rem;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .login-card .subtitle {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 0 1rem;
      transition: all 0.3s ease;
    }

    .input-group:focus-within {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.1);
      background: rgba(255,255,255,0.08);
    }

    .input-group i {
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .input-group:focus-within i {
      color: #0891b2;
    }

    .input-group input {
      width: 100%;
      padding: 0.85rem 0;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
    }

    .input-group input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(8,145,178,0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error {
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      font-size: 0.78rem;
      padding: 0.55rem 0.85rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      border: 1px solid rgba(239,68,68,0.2);
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: rgba(255,255,255,0.35);
      font-size: 0.75rem;
      text-decoration: none;
      margin-top: 1.25rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: rgba(255,255,255,0.7);
    }

    .footer-text {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      text-align: center;
      margin-top: 1.5rem;
      letter-spacing: 0.02em;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .footer-text i {
      margin-right: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-3" aria-hidden="true"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="icon-wrap" aria-hidden="true">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <h1>Guía del Parcial</h1>
      <p class="subtitle">Desarrollo Web &amp; Bases de Datos II</p>

      {% if error %}
      <div class="error" role="alert"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('index') }}" aria-label="Formulario de acceso">
        <div class="input-group">
          <i class="fas fa-user" aria-hidden="true"></i>
          <input type="text" name="nombre" placeholder="Tu nombre" required autocomplete="off" autofocus aria-label="Tu nombre">
        </div>
        <button type="submit" class="btn-login" aria-label="Entrar a la guía">
          <i class="fas fa-arrow-right" aria-hidden="true"></i> Entrar a la guía
        </button>
      </form>

      <p class="footer-text">
        <span><i class="fas fa-database"></i> Flask + SQLite</span>
        <a href="https://tecnogua.com/academic/site/" target="_blank" rel="noopener" class="back-link" aria-label="Sitio académico">
          <i class="fas fa-globe"></i> Sitio académico
        </a>
      </p>
    </div>
  </div>
</body>
</html>
