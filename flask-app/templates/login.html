<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guía Práctica - Acceso</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      background: var(--bg-secondary);
      padding: 1rem;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2.5rem 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-card .icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }
    .login-card .icon-wrap i {
      font-size: 1.5rem;
      color: var(--primary);
    }
    .login-card h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.35rem;
    }
    .login-card p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .login-card .input-group {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0 0.85rem;
      transition: border-color 0.2s;
      background: var(--bg-primary);
    }
    .login-card .input-group:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .login-card .input-group i {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .login-card input {
      width: 100%;
      padding: 0.7rem 0.75rem;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
    }
    .login-card .btn-login {
      width: 100%;
      padding: 0.7rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .login-card .btn-login:hover {
      background: var(--primary-hover);
      box-shadow: var(--shadow-md);
    }
    .login-card .error {
      background: #fef2f2;
      color: var(--danger);
      font-size: 0.78rem;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      border: 1px solid #fecaca;
    }
    [data-theme="dark"] .login-card .error {
      background: #450a0a;
      border-color: #7f1d1d;
    }
    .login-card .footer-text {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="icon-wrap">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <h1>Guía del Parcial</h1>
      <p>Ingresa tu nombre para acceder a la guía práctica de Desarrollo Web y Bases de Datos II</p>

      {% if error %}
      <div class="error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('index') }}">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" name="nombre" placeholder="Tu nombre" required autocomplete="off" autofocus>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-arrow-right"></i> Entrar a la guía
        </button>
      </form>

      <p class="footer-text">
        <i class="fas fa-database"></i> Hecho con Flask + SQLite
      </p>
    </div>
  </div>
</body>
</html>
